name: Phase 0 Quality Gates
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version-file: '.nvmrc' }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version-file: '.python-version' }
      - run: pip install mypy
      - run: mypy backend/app || true

  catalyst-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on Zoho Catalyst traces
        run: |
          if grep -ir --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.github "catalyst" .; then
            echo "Catalyst traces found! Rejecting build."
            exit 1
          fi

  security-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm audit --audit-level=critical
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version-file: '.python-version' }
      - run: pip install pip-audit
      - run: pip-audit || true
      - run: semgrep ci || true
      - uses: zricethezav/gitleaks-action@v2

  tests-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: cd frontend && npm test
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version-file: '.python-version' }
      - run: pip install "poetry<2.0"
      - run: cd backend && poetry install
      - run: cd backend && poetry run pytest

  deploy:
    needs: [lint-and-typecheck, catalyst-guard, security-scans, tests-and-coverage]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: 'perceptive-bay-493811-c1'
          workload_identity_provider: 'projects/879775404804/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '879775404804-compute@developer.gserviceaccount.com'
      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: 'prompt-wars-project-3'
          region: 'us-central1'
          source: './backend'
          project_id: 'perceptive-bay-493811-c1'
      - run: cd frontend && npm ci && npm run build
      - run: npm install -g firebase-tools
      - run: firebase deploy --only hosting
        env:
          FIREBASE_TOKEN: 4/0AdkVLPya8z1Nt4UbDzKB3e-rZFfyhFAIt1WUTcJjMUxHV5vnx5a2U1dTnfIowTsGvBoMNw
