version: '3.8'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=local
      - DATABASE_URL=postgresql+asyncpg://ecosphere:ecosphere_pass@db:5432/ecosphere
    env_file:
      - .env
    depends_on:
      - db
  
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ecosphere
      - POSTGRES_PASSWORD=ecosphere_pass
      - POSTGRES_DB=ecosphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  firebase-emulators:
    image: spine3/firebase-emulator:latest
    ports:
      - "8080:8080" # Firestore
      - "9099:9099" # Auth
      - "9199:9199" # Storage
      - "4000:4000" # UI

volumes:
  postgres_data:
